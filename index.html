<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tempo — AI Time Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Instrument+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f3ef;
  --surface: #ffffff;
  --card: #faf9f7;
  --border: #e8e4de;
  --border2: #d4cfc8;
  --ink: #1a1814;
  --ink2: #5a5550;
  --ink3: #9a9590;
  --accent: #2d6a4f;
  --accent-light: #e8f5ee;
  --amber: #c97d2a;
  --amber-light: #fdf3e3;
  --rose: #c94a4a;
  --rose-light: #fdeaea;
  --blue: #2a5fc9;
  --blue-light: #e8effe;
  --phone-w: 320px;
  --phone-h: 660px;
  --radius: 40px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  font-family: 'Instrument Sans', sans-serif;
  color: var(--ink);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 24px 60px;
}

/* Subtle grain */
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 9999; opacity: 0.4;
}

/* Header */
.header {
  text-align: center;
  margin-bottom: 44px;
}
.logo {
  font-family: 'Instrument Serif', serif;
  font-size: 2.6rem;
  color: var(--ink);
  letter-spacing: -1px;
  line-height: 1;
}
.logo em { color: var(--accent); font-style: italic; }
.tagline {
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  color: var(--ink3);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: 6px;
}

/* Scene */
.scene {
  display: flex;
  gap: 52px;
  align-items: flex-start;
  justify-content: center;
  width: 100%;
  max-width: 1000px;
  flex-wrap: wrap;
}

/* Side panels */
.side-panel {
  width: 220px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  padding-top: 60px;
}

.info-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px;
}
.info-card-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  color: var(--ink3);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.info-card-val {
  font-family: 'Instrument Serif', serif;
  font-size: 1.5rem;
  color: var(--ink);
  line-height: 1;
}
.info-card-sub { font-size: 0.72rem; color: var(--ink3); margin-top: 4px; }

.rhythm-dots { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; }
.rhythm-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--border);
  transition: background 0.3s;
}
.rhythm-dot.active { background: var(--accent); }
.rhythm-dot.partial { background: var(--amber); }

/* ── PHONE ── */
.phone-outer {
  position: relative;
  width: var(--phone-w);
  flex-shrink: 0;
}

.phone {
  width: var(--phone-w);
  height: var(--phone-h);
  background: #fff;
  border-radius: var(--radius);
  border: 1.5px solid #d8d3cc;
  box-shadow:
    0 0 0 8px #ebe7e0,
    0 0 0 10px #d8d3cc,
    0 40px 100px rgba(26,24,20,0.18),
    0 8px 24px rgba(26,24,20,0.08);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  position: relative;
}

/* Side buttons */
.phone-outer::before {
  content: '';
  position: absolute;
  left: -3px; top: 120px;
  width: 3px; height: 40px;
  background: #d0cbc3;
  border-radius: 2px 0 0 2px;
  box-shadow: 0 52px 0 #d0cbc3, 0 104px 0 #d0cbc3;
}
.phone-outer::after {
  content: '';
  position: absolute;
  right: -3px; top: 150px;
  width: 3px; height: 60px;
  background: #d0cbc3;
  border-radius: 0 2px 2px 0;
}

/* Notch */
.phone-notch {
  position: absolute;
  top: 0; left: 50%; transform: translateX(-50%);
  width: 110px; height: 30px;
  background: #fff;
  border-radius: 0 0 18px 18px;
  z-index: 20;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  border-bottom: 1px solid #eee;
}
.notch-pill {
  width: 56px; height: 8px;
  background: #1a1814;
  border-radius: 10px;
}
.notch-dot {
  width: 8px; height: 8px;
  background: #1a1814;
  border-radius: 50%;
  margin-left: 4px;
}

.status-bar {
  padding: 8px 20px 0;
  display: flex; justify-content: space-between; align-items: center;
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  color: var(--ink2);
  z-index: 10;
}
.status-right { display: flex; gap: 5px; align-items: center; font-size: 0.58rem; }

/* Screen area */
.phone-screen {
  flex: 1;
  overflow: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
}

/* Screens */
.screen {
  position: absolute; inset: 0;
  overflow-y: auto;
  padding: 14px 16px 80px;
  display: none;
  flex-direction: column;
  gap: 12px;
  scrollbar-width: none;
}
.screen::-webkit-scrollbar { display: none; }
.screen.active { display: flex; }

/* Screen header */
.screen-hd {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 4px;
}
.screen-title {
  font-family: 'Instrument Serif', serif;
  font-size: 1.4rem;
  color: var(--ink);
  letter-spacing: -0.5px;
}
.screen-sub {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  color: var(--ink3);
}

/* Chat */
.chat-msgs { display: flex; flex-direction: column; gap: 10px; margin-bottom: 8px; }
.msg { max-width: 85%; }
.msg.ai { align-self: flex-start; }
.msg.user { align-self: flex-end; }
.msg-bubble {
  padding: 10px 13px;
  border-radius: 16px;
  font-size: 0.8rem;
  line-height: 1.5;
}
.msg.ai .msg-bubble {
  background: var(--card);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
  color: var(--ink);
}
.msg.user .msg-bubble {
  background: var(--ink);
  color: #fff;
  border-bottom-right-radius: 4px;
}
.msg-time {
  font-family: 'DM Mono', monospace;
  font-size: 0.58rem;
  color: var(--ink3);
  margin-top: 3px;
  padding: 0 4px;
}
.msg.user .msg-time { text-align: right; }

.chat-input-bar {
  position: absolute;
  bottom: 68px; left: 0; right: 0;
  padding: 10px 14px;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(8px);
  border-top: 1px solid var(--border);
  display: flex; gap: 8px; align-items: center;
}
.chat-input {
  flex: 1;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 8px 14px;
  font-family: 'Instrument Sans', sans-serif;
  font-size: 0.78rem;
  color: var(--ink);
  outline: none;
  transition: border-color 0.2s;
}
.chat-input:focus { border-color: var(--accent); }
.chat-input::placeholder { color: var(--ink3); }
.send-btn {
  width: 34px; height: 34px;
  background: var(--ink);
  border: none; border-radius: 50%;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: #fff;
  transition: background 0.2s, transform 0.1s;
  flex-shrink: 0;
}
.send-btn:hover { background: var(--accent); }
.send-btn:active { transform: scale(0.92); }

/* Task chip inside chat */
.task-chip {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--accent-light);
  border: 1px solid #b7dfc9;
  border-radius: 8px;
  padding: 5px 10px;
  font-size: 0.72rem; color: var(--accent);
  font-weight: 600; margin-top: 5px; cursor: pointer;
  transition: background 0.2s;
}
.task-chip:hover { background: #d4eedd; }

/* Slot suggestion */
.slot-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 12px;
  margin-top: 6px;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
}
.slot-card:hover { border-color: var(--accent); background: var(--accent-light); }
.slot-time { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--accent); font-weight: 500; }
.slot-label { font-size: 0.75rem; color: var(--ink); margin-top: 1px; }
.slot-tag { font-size: 0.62rem; color: var(--ink3); margin-top: 2px; }

/* Tasks screen */
.task-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 12px 14px;
  display: flex; gap: 10px; align-items: flex-start;
  transition: border-color 0.2s;
}
.task-item:hover { border-color: var(--border2); }
.task-check-box {
  width: 18px; height: 18px;
  border: 1.5px solid var(--border2);
  border-radius: 5px;
  flex-shrink: 0; margin-top: 2px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 11px;
}
.task-item.done .task-check-box { background: var(--accent); border-color: var(--accent); color: #fff; }
.task-info { flex: 1; }
.task-name-t { font-size: 0.82rem; font-weight: 600; color: var(--ink); }
.task-item.done .task-name-t { text-decoration: line-through; color: var(--ink3); }
.task-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 5px; }
.tag {
  font-family: 'DM Mono', monospace;
  font-size: 0.58rem; padding: 2px 7px;
  border-radius: 20px; font-weight: 500;
}
.tag-green { background: var(--accent-light); color: var(--accent); }
.tag-amber { background: var(--amber-light); color: var(--amber); }
.tag-blue { background: var(--blue-light); color: var(--blue); }
.tag-rose { background: var(--rose-light); color: var(--rose); }
.tag-gray { background: #f0ede8; color: var(--ink3); }

/* Calendar screen */
.cal-week-hd {
  display: grid; grid-template-columns: 36px repeat(7,1fr);
  gap: 2px; margin-bottom: 8px;
}
.cal-day-hd {
  text-align: center;
  font-family: 'DM Mono', monospace;
  font-size: 0.58rem; color: var(--ink3);
  padding: 3px 0;
}
.cal-day-hd.today { color: var(--accent); font-weight: 600; }

.cal-grid {
  display: grid;
  grid-template-columns: 36px repeat(7,1fr);
  gap: 2px;
  font-size: 0.6rem;
}
.cal-hour-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.55rem; color: var(--ink3);
  padding-top: 2px; text-align: right; padding-right: 4px;
}
.cal-cell {
  height: 26px;
  background: var(--card);
  border-radius: 4px;
  border: 1px solid transparent;
  position: relative; overflow: hidden;
}
.cal-event {
  position: absolute; inset: 1px;
  border-radius: 3px;
  display: flex; align-items: center;
  padding: 0 4px;
  font-size: 0.55rem; font-weight: 600;
  overflow: hidden; white-space: nowrap;
  cursor: pointer;
}
.ev-green { background: var(--accent-light); color: var(--accent); }
.ev-blue { background: var(--blue-light); color: var(--blue); }
.ev-amber { background: var(--amber-light); color: var(--amber); }
.ev-rose { background: var(--rose-light); color: var(--rose); }
.ev-suggested {
  background: repeating-linear-gradient(45deg, #e8f5ee, #e8f5ee 3px, #d4eedd 3px, #d4eedd 6px);
  color: var(--accent);
  border: 1px dashed #b7dfc9;
  opacity: 0.85;
}

/* Review screen */
.review-week-bar {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
}
.review-bar-hd { display: flex; justify-content: space-between; margin-bottom: 10px; }
.review-bar-title { font-size: 0.78rem; font-weight: 600; }
.review-pct { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--accent); }
.review-days { display: flex; gap: 4px; }
.review-day-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
.review-day-bar-wrap { height: 60px; display: flex; align-items: flex-end; width: 100%; }
.review-day-bar {
  width: 100%; border-radius: 4px 4px 0 0;
  background: var(--accent);
  transition: height 0.8s cubic-bezier(0.34,1.56,0.64,1);
}
